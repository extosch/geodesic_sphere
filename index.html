<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geodesic Sphere Visualization!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="controls">
            <h1>Geodesic Sphere</h1>
            
            <div class="control-group">
                <label for="frequency">Frequency (F):</label>
                <input type="number" id="frequency" min="1" max="10" value="1">
                <button id="updateBtn">Update</button>
            </div>
            
            <div class="control-group">
                <label>
                    <input type="checkbox" id="showFaces" checked>
                    Show Faces
                </label>
            </div>
            
            <div class="control-group">
                <label>
                    <input type="checkbox" id="showWireframe" checked>
                    Show Wireframe
                </label>
            </div>
            
            <div class="control-group">
                <label>
                    <input type="checkbox" id="autoRotate" checked>
                    Auto-Rotation
                </label>
            </div>
            
            <div class="info-panel">
                <h3>Geometry Information</h3>
                <div class="info-item">
                    <span class="info-label">Number of Vertices:</span>
                    <span id="vertexCount">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Number of Edges:</span>
                    <span id="edgeCount">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Unique Edge Lengths:</span>
                    <span id="edgeLengthCount">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Number of Triangles:</span>
                    <span id="faceCount">0</span>
                </div>
            </div>
            
            <div class="instructions">
                <h3>Controls</h3>
                <ul>
                    <li>Left Mouse Button: Rotation</li>
                    <li>Right Mouse Button: Pan</li>
                    <li>Mouse Wheel: Zoom</li>
                </ul>
            </div>
        </div>
        
        <div id="canvas-container"></div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
